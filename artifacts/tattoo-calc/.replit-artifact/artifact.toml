kind = "web"
previewPath = "/"
title = "Calculadora de Tatuagem"
version = "1.0.0"
id = "artifacts/tattoo-calc"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18651

[services.development]
run = "pnpm --filter @workspace/tattoo-calc run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tattoo-calc", "run", "build" ]
publicDir = "artifacts/tattoo-calc/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18651"
BASE_PATH = "/"
